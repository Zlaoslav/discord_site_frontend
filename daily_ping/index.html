<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Ping Widget</title>
  <style>
    :root{ --bg:#0b0b0d; --muted:#9aa0a6; --accent:#00b39f; }
    html,body{ height:100%; margin:0; font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:linear-gradient(180deg,#050507,#0e1114); color:#fff; -webkit-font-smoothing:antialiased; display:flex; align-items:center; justify-content:center; }
    .widget{ width:min(920px,96%); max-width:920px; padding:16px; border-radius:14px; background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); box-shadow:0 6px 30px rgba(2,6,23,0.6); border:1px solid rgba(255,255,255,0.04); display:flex; gap:16px; align-items:center; justify-content:space-between }
    .left{ display:flex; gap:12px; align-items:center }
    .icon{ width:64px; height:64px; border-radius:12px; background:linear-gradient(135deg,#111217,#0f1b16); display:flex; align-items:center; justify-content:center; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04) }
    .icon svg{ width:34px; height:34px; fill:var(--accent) }
    .title{ font-size:14px; color:var(--muted) }
    .main{ font-weight:700; font-size:18px }
    .counters{ display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; flex:1; margin-left:16px }
    .count{ background: rgba(255,255,255,0.02); padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.02); display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:70px }
    .count .num{ font-size:20px; font-weight:700; color:#fff }
    .count .label{ font-size:11px; color:var(--muted); margin-top:4px; text-align:center; text-transform:uppercase; letter-spacing:1px }
    .footer{ font-size:12px; color:var(--muted); margin-top:12px; text-align:center; width:100% }
    @media (max-width:640px){ .widget{ padding:12px; border-radius:12px; flex-direction:column; align-items:stretch } .counters{ grid-template-columns: repeat(2,1fr); margin-left:0 } .left{ justify-content:space-between } }
  </style>
</head>
<body>
  <div style="width:100%;max-width:980px;padding:12px;">
    <div class="widget" role="region" aria-label="Daily Ping">
      <div class="left" style="flex:none;">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3C7.03 3 3 7.03 3 12h2a7 7 0 1 1 14 0h2c0-4.97-4.03-9-9-9z" fill="currentColor"/></svg>
        </div>
        <div style="margin-left:12px;">
          <div class="title">Daily ping</div>
          <div class="main" id="main-status">Загрузка…</div>
        </div>
      </div>
      <div class="counters" id="counters">
        <div class="count"><div class="num" id="last_day">—</div><div class="label">Last day</div></div>
        <div class="count"><div class="num" id="last_month">—</div><div class="label">Last month</div></div>
        <div class="count"><div class="num" id="last_year">—</div><div class="label">Last year</div></div>
        <div class="count"><div class="num" id="all_time">—</div><div class="label">All time</div></div>
      </div>
    </div>
    <div class="footer" id="footer">Обновлено: <span id="updated">—</span></div>
  </div>

  <script>
    const endpoints = { url: 'https://pollpi.slavi.workers.dev/daily_ping' };
    const fmt = new Intl.NumberFormat('ru-RU');
    let prev = {last_day:0,last_month:0,last_year:0,all_time:0};

    function animateValue(el, start, end, duration=700){
      if(start === end){ el.textContent = fmt.format(end); return; }
      const startTime = performance.now();
      function tick(now){
        const t = Math.min(1, (now - startTime) / duration);
        const v = Math.round(start + (end - start) * (1 - Math.pow(1 - t, 3)));
        el.textContent = fmt.format(v);
        if(t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    async function fetchAndUpdate(){
      try{
        const res = await fetch(endpoints.url + '?_=' + Date.now(), {cache:'no-store'});
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('main-status').textContent = 'OK';
        const now = new Date().toLocaleString();
        document.getElementById('updated').textContent = now;
        ['last_day','last_month','last_year','all_time'].forEach(k => {
          const el = document.getElementById(k);
          const val = Number(data[k] ?? 0);
          animateValue(el, prev[k] || 0, val);
          prev[k] = val;
        });
      }catch(err){
        document.getElementById('main-status').textContent = 'Ошибка';
        document.getElementById('updated').textContent = new Date().toLocaleString();
      }
    }

    fetchAndUpdate();
    setInterval(fetchAndUpdate, 60*1000);
  </script>
</body>
</html>
